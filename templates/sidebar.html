<aside class="sidebar" id="appSidebar">
  <script>
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
      document.getElementById('appSidebar').classList.add('collapsed');
    }
  </script>

  <div class="sidebar-top">
    <a href="/dashboard" class="sidebar-brand">
      <div class="sidebar-brand-mark"><i data-lucide="compass"></i></div>
      <span class="sidebar-brand-name">TravelMind</span>
    </a>
    <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="Collapse sidebar">
      <i data-lucide="panel-left"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Menu</div>
    <a href="/dashboard" class="s-link {{ 'active' if active_page == 'dashboard' else '' }}" title="Home">
      <span class="s-icon"><i data-lucide="layout-dashboard"></i></span> <span class="s-text">Home</span>
    </a>
    <a href="/create" class="s-link {{ 'active' if active_page == 'create' else '' }}" title="New Trip">
      <span class="s-icon"><i data-lucide="plus"></i></span> <span class="s-text">New Trip</span>
    </a>
    <a href="/trips" class="s-link {{ 'active' if active_page == 'trips' else '' }}" title="Saved Trips">
      <span class="s-icon"><i data-lucide="folder"></i></span> <span class="s-text">Saved Trips</span>
    </a>

    <div class="sidebar-section-label">Account</div>
    <a href="/profile" class="s-link {{ 'active' if active_page == 'profile' else '' }}" title="Profile">
      <span class="s-icon"><i data-lucide="user"></i></span> <span class="s-text">Profile</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <div class="sidebar-user">
      <div class="sidebar-avatar">{{ username[0].upper() if username else 'U' }}</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">{{ username }}</div>
        <div class="sidebar-user-role">Traveller</div>
      </div>
    </div>
    <form action="/logout" method="GET">
      <button type="submit" class="sidebar-logout" title="Sign Out"><i data-lucide="log-out"></i> <span class="s-text">Sign Out</span></button>
    </form>
  </div>
</aside>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) lucide.createIcons();

    const sidebar = document.getElementById('appSidebar');
    const collapseBtn = document.getElementById('sidebarCollapseBtn');
    collapseBtn.title = sidebar.classList.contains('collapsed') ? 'Expand sidebar' : 'Collapse sidebar';

    collapseBtn.addEventListener('click', () => {
      const collapsed = sidebar.classList.toggle('collapsed');
      localStorage.setItem('sidebarCollapsed', collapsed);
      collapseBtn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
    });
  });
</script>
