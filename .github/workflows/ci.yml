name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.5"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Tests mock every Gemini call, so this just needs to be a
          # non-empty string to satisfy the Client() constructor at import
          # time — it's never used to make a real API call.
          GEMINI_API_KEY: "ci-placeholder-key"
        run: pytest tests/ -v
